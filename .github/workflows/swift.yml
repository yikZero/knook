name: Swift

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Show toolchain
        run: swift --version
      - name: Run tests
        run: swift test
